name: 'Container Image Changelog'
description: 'Generates a changelog between two container image versions using SBOM attestations via Cosign'
author: 'hanthor'
inputs:
  family:
    description: 'Known image family (e.g. bluefin, aurora). Provides registry, cosign-key, and images automatically. Not needed when registry + cosign-key + images are all set.'
    required: false
  registry:
    description: 'Container registry prefix (e.g. ghcr.io/tuna-os/). Required when family is not set.'
    required: false
  cosign-key:
    description: 'URL or path to cosign public key. Required when family is not set.'
    required: false
  images:
    description: 'Space-separated list of image names to compare (e.g. "yellowfin albacore"). Overrides the family default.'
    required: false
  stream:
    description: 'Release stream for auto-discovery (e.g. stable, latest, gnome). Finds the two most recent {stream}-YYYYMMDD tags.'
    required: false
  prev_tag:
    description: 'Previous release tag (ignored if stream is set)'
    required: false
  curr_tag:
    description: 'Current release tag (ignored if stream is set)'
    required: false
  handwritten:
    description: 'Optional introductory text for the changelog'
    required: false
  output:
    description: 'Output file path'
    required: false
    default: 'changelog.md'
  output-env:
    description: 'Output environment file path (writes TITLE=... and TAG=...)'
    required: false
  json:
    description: 'Output JSON instead of Markdown'
    required: false
    default: 'false'
  verbose:
    description: 'Enable debug logging'
    required: false
    default: 'false'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/hanthor/changelog-action:latest'
  args:
    - ${{ inputs.family && '--family' || '' }}
    - ${{ inputs.family }}
    - ${{ inputs.registry && '--registry' || '' }}
    - ${{ inputs.registry }}
    - ${{ inputs.cosign-key && '--cosign-key' || '' }}
    - ${{ inputs.cosign-key }}
    - ${{ inputs.images && '--images' || '' }}
    - ${{ inputs.images }}
    - ${{ inputs.stream && '--stream' || '' }}
    - ${{ inputs.stream }}
    - ${{ inputs.handwritten && '--handwritten' || '' }}
    - ${{ inputs.handwritten }}
    - --output
    - ${{ inputs.output }}
    - ${{ inputs.output-env && '--output-env' || '' }}
    - ${{ inputs.output-env }}
    - ${{ inputs.json == 'true' && '--json' || '' }}
    - ${{ inputs.verbose == 'true' && '--verbose' || '' }}
    - ${{ !inputs.stream && inputs.prev_tag || '' }}
    - ${{ !inputs.stream && inputs.curr_tag || '' }}
